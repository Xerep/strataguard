name: Deploy StrataGuard Dashboard
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Inject Supabase credentials
        run: |
          sed -i "s|'__SUPABASE_URL__'|'${{ secrets.SUPABASE_URL }}'|g" index.html
          sed -i "s|'__SUPABASE_KEY__'|'${{ secrets.SUPABASE_ANON_KEY }}'|g" index.html

      - name: Verify injection worked
        run: |
          if grep -q "__SUPABASE_URL__" index.html; then
            echo "ERROR: Placeholder still present - injection failed"
            exit 1
          else
            echo "SUCCESS: Credentials injected correctly"
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
